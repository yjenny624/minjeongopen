<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎈 TO. 하민정 🎈</title>

    <style>
        :root {
            --bg-color: #fff6f8;
            --main-pink: #ffb7c5;
            --dark-pink: #ff7b94;
            --apple-red: #ff6b8b;
            --photo-orange: #ff914d; 
            --tree-green: #a8dfb5; 
            --tree-green-shadow: #8ecda0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Gowun Dodum', sans-serif;
            color: #4a4a4a;
            overflow-x: hidden;
            -webkit-text-size-adjust: none; /* 모바일에서 가로 회전시 폰트 제멋대로 커지는 현상 방지 */
        }

        /* 배경 하트 비 효과 */
        .heart-rain {
            position: absolute;
            color: var(--main-pink);
            font-size: 20px;
            animation: fall linear infinite;
            z-index: 0;
            user-select: none;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 15px; /* 모바일 여백 축소 */
            box-sizing: border-box;
            position: relative;
        }

        /* --- STAGE 1: 인트로 --- */
        #stage1 { z-index: 10; }
        .intro-box {
            background: white;
            padding: 35px 20px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 183, 197, 0.25);
            text-align: center;
            border: 2px solid var(--main-pink);
            max-width: 340px;
            width: 100%;
            z-index: 2;
            box-sizing: border-box;
        }
        .intro-box h1 {
            font-family: 'Gowun Dodum', sans-serif;
            font-size: 26px;
            font-weight: bold;
            margin: 0 0 15px 0;
            color: var(--dark-pink);
            letter-spacing: -0.5px;
        }
        .intro-box p {
            font-size: 14px;
            color: #777;
            margin-bottom: 25px;
        }
        .btn-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px; 
            width: 100%;
            height: 60px;
        }

            padding: 11px 20px;
            border: none;
